<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS Space Insurance Estimator | Premium Edition v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        anthropicBlack: '#0a0a0a',
                        anthropicDark: '#121212',
                        anthropicGray: '#a1a1aa',
                        premiumBlue: '#38bdf8', 
                        premiumGreen: '#4ade80'
                    },
                    fontFamily: {
                        sans: ['Inter', 'SF Pro Display', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
                        mono: ['SF Mono', 'Roboto Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0a; color: #fafafa; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
        
        /* Custom Radio/Checkbox Card Styling */
        .param-radio:checked + div {
            border-color: #38bdf8;
            background-color: rgba(56, 189, 248, 0.05);
        }
        .param-radio:checked + div .radio-indicator {
            background-color: #38bdf8;
            border-color: #38bdf8;
            box-shadow: inset 0 0 0 2px #18181b;
        }
        .param-checkbox:checked + div {
            border-color: #4ade80;
            background-color: rgba(74, 222, 128, 0.05);
        }
        .param-checkbox:checked + div .check-indicator {
            background-color: #4ade80;
            border-color: #4ade80;
        }
        .selected-card {
            border-color: #38bdf8 !important;
            box-shadow: 0 0 0 1px #38bdf8;
            background-color: rgba(56, 189, 248, 0.05) !important;
        }
        
        /* Text Placeholder for Rockets */
        .rocket-placeholder {
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-align: center;
            padding: 0 1rem;
            color: #ffffff;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-[1600px] mx-auto">
        <header class="mb-8 flex items-center justify-between border-b border-[#27272a] pb-6">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-white">AEGIS Underwriting Engine</h1>
                <p class="text-anthropicGray mt-1.5 text-sm md:text-base">Interactive Burn-on-Line Analytics & Policy Structuring</p>
            </div>
            <div class="text-xs px-3 py-1 bg-premiumBlue/10 border border-premiumBlue/30 text-premiumBlue rounded font-mono hidden md:block">AEGIS_BUILD_v4</div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
            
            <div class="xl:col-span-4 space-y-6">
                
                <div class="bg-[#121212] p-5 rounded-lg border border-[#27272a]">
                    <div class="mb-6">
                        <label class="block text-xs font-medium text-anthropicGray mb-2 uppercase tracking-wider">Total Insured Value ($M)</label>
                        <input type="number" id="insuredValue" value="75" min="1" class="w-full bg-[#18181b] border-[#3f3f46] text-white rounded shadow-sm border p-3 text-2xl font-mono focus:ring-1 focus:ring-premiumBlue outline-none transition-all">
                    </div>

                    <div class="mb-6">
                        <label class="block text-xs font-medium text-anthropicGray mb-2 uppercase tracking-wider">Target Orbit</label>
                        <div class="grid grid-cols-2 gap-2">
                            <label class="cursor-pointer relative">
                                <input type="radio" name="orbit" value="1.0" class="param-radio hidden" checked>
                                <div class="border border-[#3f3f46] bg-[#18181b] rounded p-3 transition-colors hover:border-[#52525b] flex items-center gap-3">
                                    <div class="radio-indicator w-3 h-3 rounded-full border border-anthropicGray transition-all"></div>
                                    <span class="text-sm text-white font-medium">LEO <span class="text-xs text-anthropicGray font-normal block">Base Risk</span></span>
                                </div>
                            </label>
                            <label class="cursor-pointer relative">
                                <input type="radio" name="orbit" value="1.05" class="param-radio hidden">
                                <div class="border border-[#3f3f46] bg-[#18181b] rounded p-3 transition-colors hover:border-[#52525b] flex items-center gap-3">
                                    <div class="radio-indicator w-3 h-3 rounded-full border border-anthropicGray transition-all"></div>
                                    <span class="text-sm text-white font-medium">SSO <span class="text-xs text-anthropicGray font-normal block">+5% Premium</span></span>
                                </div>
                            </label>
                            <label class="cursor-pointer relative">
                                <input type="radio" name="orbit" value="1.20" class="param-radio hidden">
                                <div class="border border-[#3f3f46] bg-[#18181b] rounded p-3 transition-colors hover:border-[#52525b] flex items-center gap-3">
                                    <div class="radio-indicator w-3 h-3 rounded-full border border-anthropicGray transition-all"></div>
                                    <span class="text-sm text-white font-medium">MEO <span class="text-xs text-anthropicGray font-normal block">+20% Premium</span></span>
                                </div>
                            </label>
                            <label class="cursor-pointer relative">
                                <input type="radio" name="orbit" value="1.30" class="param-radio hidden">
                                <div class="border border-[#3f3f46] bg-[#18181b] rounded p-3 transition-colors hover:border-[#52525b] flex items-center gap-3">
                                    <div class="radio-indicator w-3 h-3 rounded-full border border-anthropicGray transition-all"></div>
                                    <span class="text-sm text-white font-medium">GTO/GEO <span class="text-xs text-anthropicGray font-normal block">+30% Premium</span></span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="block text-xs font-medium text-anthropicGray mb-2 uppercase tracking-wider">Bus Heritage</label>
                        <div class="grid grid-cols-1 gap-2">
                            <label class="cursor-pointer relative">
                                <input type="radio" name="heritage" value="0.9" class="param-radio hidden">
                                <div class="border border-[#3f3f46] bg-[#18181b] rounded p-3 transition-colors hover:border-[#52525b] flex justify-between items-center">
                                    <div class="flex items-center gap-3">
                                        <div class="radio-indicator w-3 h-3 rounded-full border border-anthropicGray shrink-0"></div>
                                        <span class="text-sm text-white font-medium">Flight Proven (>5 identical units)</span>
                                    </div>
                                    <span class="text-xs text-premiumGreen font-mono bg-premiumGreen/10 px-2 py-0.5 rounded">-10%</span>
                                </div>
                            </label>
                            <label class="cursor-pointer relative">
                                <input type="radio" name="heritage" value="1.0" class="param-radio hidden" checked>
                                <div class="border border-[#3f3f46] bg-[#18181b] rounded p-3 transition-colors hover:border-[#52525b] flex justify-between items-center">
                                    <div class="flex items-center gap-3">
                                        <div class="radio-indicator w-3 h-3 rounded-full border border-anthropicGray shrink-0"></div>
                                        <span class="text-sm text-white font-medium">Standard Heritage (1-4 units)</span>
                                    </div>
                                    <span class="text-xs text-anthropicGray font-mono">BASE</span>
                                </div>
                            </label>
                            <label class="cursor-pointer relative">
                                <input type="radio" name="heritage" value="1.4" class="param-radio hidden">
                                <div class="border border-[#3f3f46] bg-[#18181b] rounded p-3 transition-colors hover:border-[#52525b] flex justify-between items-center">
                                    <div class="flex items-center gap-3">
                                        <div class="radio-indicator w-3 h-3 rounded-full border border-anthropicGray shrink-0"></div>
                                        <span class="text-sm text-white font-medium">Novel Technology (First Flight)</span>
                                    </div>
                                    <span class="text-xs text-red-400 font-mono bg-red-400/10 px-2 py-0.5 rounded">+40%</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-anthropicGray mb-2 uppercase tracking-wider">Advanced Coverage Options</label>
                        <div class="grid grid-cols-1 gap-2">
                            <label class="cursor-pointer relative">
                                <input type="checkbox" id="chk-inorbit" class="param-checkbox hidden" checked>
                                <div class="border border-[#3f3f46] bg-[#18181b] rounded p-3 transition-colors hover:border-[#52525b] flex items-start gap-3">
                                    <div class="check-indicator w-4 h-4 rounded-sm border border-anthropicGray shrink-0 mt-0.5 flex items-center justify-center"></div>
                                    <div>
                                        <span class="text-sm text-white font-medium block">First Year In-Orbit Life</span>
                                        <span class="text-xs text-anthropicGray block mt-0.5">Covers early on-orbit anomalies (+1.5% flat)</span>
                                    </div>
                                </div>
                            </label>
                            <label class="cursor-pointer relative">
                                <input type="checkbox" id="chk-constellation" class="param-checkbox hidden">
                                <div class="border border-[#3f3f46] bg-[#18181b] rounded p-3 transition-colors hover:border-[#52525b] flex items-start gap-3">
                                    <div class="check-indicator w-4 h-4 rounded-sm border border-anthropicGray shrink-0 mt-0.5"></div>
                                    <div>
                                        <span class="text-sm text-white font-medium block">Constellation Block Policy</span>
                                        <span class="text-xs text-anthropicGray block mt-0.5">Bulk discount for >5 units (-15%)</span>
                                    </div>
                                </div>
                            </label>
                            <label class="cursor-pointer relative">
                                <input type="checkbox" id="chk-reused" class="param-checkbox hidden" checked>
                                <div class="border border-[#3f3f46] bg-[#18181b] rounded p-3 transition-colors hover:border-[#52525b] flex items-start gap-3">
                                    <div class="check-indicator w-4 h-4 rounded-sm border border-anthropicGray shrink-0 mt-0.5"></div>
                                    <div>
                                        <span class="text-sm text-white font-medium block">Reused Booster Modifier</span>
                                        <span class="text-xs text-anthropicGray block mt-0.5">Actuarial load for flight-proven stages (+2%)</span>
                                    </div>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="xl:col-span-5 space-y-6">
                <div class="bg-[#121212] p-5 rounded-lg border border-[#27272a] flex flex-col h-[750px]">
                    <div class="flex justify-between items-end mb-4 border-b border-[#27272a] pb-2 shrink-0">
                        <h2 class="text-lg font-semibold text-white tracking-tight">Launch Provider Market</h2>
                        <span id="risk-badge" class="text-[10px] uppercase tracking-wider font-mono px-2 py-1 rounded border">--</span>
                    </div>
                    
                    <div class="overflow-y-auto pr-2 flex-grow space-y-6" id="lv-container">
                        </div>
                </div>
            </div>

            <div class="xl:col-span-3">
                <div class="bg-[#121212] p-5 rounded-lg border border-[#27272a] mb-6">
                    <h2 class="text-sm font-semibold text-white tracking-tight mb-3 border-b border-[#27272a] pb-2">Orbital Transfer Vehicle (OTV)</h2>
                    <div class="grid grid-cols-2 gap-2" id="otv-container">
                        </div>
                </div>

                <div class="bg-[#0a0a0a] p-6 rounded-lg border border-[#3f3f46] shadow-2xl relative overflow-hidden">
                    <div class="absolute -top-20 -right-20 w-64 h-64 bg-premiumBlue/5 rounded-full blur-3xl pointer-events-none"></div>

                    <h2 class="text-xl font-bold mb-6 text-white tracking-tight border-b border-[#27272a] pb-3 uppercase text-sm">Underwriting Summary</h2>
                    
                    <div class="space-y-4 font-mono text-sm mb-8 relative z-10">
                        <div class="flex justify-between items-center bg-[#121212] p-2.5 rounded border border-[#27272a]">
                            <span class="text-anthropicGray">Hardware Rel:</span>
                            <span id="out-pos" class="text-white font-bold">--%</span>
                        </div>
                        
                        <div class="flex justify-between items-center bg-[#121212] p-2.5 rounded border border-[#27272a]">
                            <span class="text-anthropicGray">Tech Burn Rate:</span>
                            <span id="out-tech-rate" class="text-yellow-400 font-bold">--%</span>
                        </div>

                        <div class="flex justify-between items-center bg-[#18181b] p-3 rounded border border-premiumBlue/30 shadow-[0_0_10px_rgba(56,189,248,0.1)]">
                            <span class="text-anthropicGray">Commercial Rate:</span>
                            <span id="out-final-rate" class="text-xl text-premiumBlue font-bold">--%</span>
                        </div>
                    </div>

                    <div class="relative z-10 border-t border-[#27272a] pt-6">
                        <div>
                            <p class="text-premiumGreen text-xs uppercase tracking-widest mb-1 font-bold flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full bg-premiumGreen animate-pulse"></span>
                                Est. Premium
                            </p>
                            <p id="out-premium" class="text-4xl lg:text-5xl font-bold tracking-tighter text-premiumGreen break-words">$0.00</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Expanded Database with Flags and sleek UI colors
        const launchTiers = [
            {
                name: "Tier 1: Proven Heritage",
                desc: ">98% Actuarial Reliability. High market capacity.",
                border: "border-premiumGreen/30", bg: "bg-premiumGreen/10", text: "text-premiumGreen", hex: "#14532d",
                vehicles: [
                    { id: 'f9', name: 'Falcon 9', flag: '🇺🇸', rel: 0.995 },
                    { id: 'atlasv', name: 'Atlas V', flag: '🇺🇸', rel: 0.995 },
                    { id: 'soyuz', name: 'Soyuz-2', flag: '🇷🇺', rel: 0.985 },
                    { id: 'lm234', name: 'Long March 2/3/4', flag: '🇨🇳', rel: 0.980 },
                    { id: 'ariane5', name: 'Ariane 5 (Legacy)', flag: '🇪🇺', rel: 0.985 }
                ]
            },
            {
                name: "Tier 2: Established",
                desc: ">95% Reliability. Strong commercial track record.",
                border: "border-cyan-400/30", bg: "bg-cyan-400/10", text: "text-cyan-400", hex: "#083344",
                vehicles: [
                    { id: 'fh', name: 'Falcon Heavy', flag: '🇺🇸', rel: 0.975 },
                    { id: 'electron', name: 'Electron', flag: '🇺🇸', rel: 0.965 },
                    { id: 'pslv', name: 'PSLV', flag: '🇮🇳', rel: 0.965 },
                    { id: 'lm567', name: 'Long March 5/6/7', flag: '🇨🇳', rel: 0.955 },
                    { id: 'h2a', name: 'H-IIA', flag: '🇯🇵', rel: 0.970 },
                    { id: 'minotaur', name: 'Minotaur IV', flag: '🇺🇸', rel: 0.960 }
                ]
            },
            {
                name: "Tier 3: Emerging Operators",
                desc: "90-95% Reliability. Proven contractors, new variants.",
                border: "border-yellow-400/30", bg: "bg-yellow-400/10", text: "text-yellow-400", hex: "#422006",
                vehicles: [
                    { id: 'ariane6', name: 'Ariane 6', flag: '🇪🇺', rel: 0.940 },
                    { id: 'vulcan', name: 'Vulcan Centaur', flag: '🇺🇸', rel: 0.935 },
                    { id: 'h3', name: 'H3 Rocket', flag: '🇯🇵', rel: 0.930 },
                    { id: 'gslv', name: 'LVM3', flag: '🇮🇳', rel: 0.925 },
                    { id: 'vegac', name: 'Vega-C', flag: '🇪🇺', rel: 0.910 },
                    { id: 'kinetica', name: 'Kinetica-1', flag: '🇨🇳', rel: 0.920 },
                    { id: 'ceres', name: 'Ceres-1', flag: '🇨🇳', rel: 0.910 }
                ]
            },
            {
                name: "Tier 4: Developmental",
                desc: "<90% Actuarial Reliability. Severe risk loads apply.",
                border: "border-red-400/30", bg: "bg-red-400/10", text: "text-red-400", hex: "#450a0a",
                vehicles: [
                    { id: 'starship', name: 'Starship', flag: '🇺🇸', rel: 0.880 },
                    { id: 'newglenn', name: 'New Glenn', flag: '🇺🇸', rel: 0.880 },
                    { id: 'alpha', name: 'Firefly Alpha', flag: '🇺🇸', rel: 0.860 },
                    { id: 'terranr', name: 'Terran R', flag: '🇺🇸', rel: 0.850 },
                    { id: 'sslv', name: 'SSLV', flag: '🇮🇳', rel: 0.850 },
                    { id: 'zhuque', name: 'Zhuque-2', flag: '🇨🇳', rel: 0.840 },
                    { id: 'rfa', name: 'RFA One', flag: '🇩🇪', rel: 0.820 },
                    { id: 'spectrum', name: 'Spectrum', flag: '🇩🇪', rel: 0.820 },
                    { id: 'miura', name: 'Miura 5', flag: '🇪🇸', rel: 0.800 },
                    { id: 'prime', name: 'Prime', flag: '🇬🇧', rel: 0.800 },
                    { id: 'rs1', name: 'RS1', flag: '🇺🇸', rel: 0.800 }
                ]
            }
        ];

        const orbitalTugs = [
            { id: 'none', name: 'No OTV', rel: 1.0 },
            { id: 'photon', name: 'Photon', rel: 0.98 },
            { id: 'ion', name: 'ION Carrier', rel: 0.97 },
            { id: 'sherpa', name: 'Sherpa', rel: 0.96 },
            { id: 'spacevan', name: 'Space Van', rel: 0.92 },
            { id: 'vigoride', name: 'Vigoride', rel: 0.90 }
        ];

        let selectedLV = launchTiers[0].vehicles[0]; 
        let selectedTierInfo = launchTiers[0];
        let selectedOTV = orbitalTugs[0];

        function initDOM() {
            const lvContainer = document.getElementById('lv-container');
            const otvContainer = document.getElementById('otv-container');

            // Build Launch Vehicles
            launchTiers.forEach((tier) => {
                const header = document.createElement('div');
                header.className = `mt-6 mb-3 first:mt-0 border-l-4 ${tier.border} pl-3`;
                header.innerHTML = `
                    <h3 class="text-sm font-bold text-white uppercase tracking-wider">${tier.name}</h3>
                    <p class="text-[11px] text-anthropicGray mt-0.5">${tier.desc}</p>
                `;
                lvContainer.appendChild(header);

                const grid = document.createElement('div');
                grid.className = "grid grid-cols-2 md:grid-cols-3 gap-3";
                
                tier.vehicles.forEach((lv) => {
                    const div = document.createElement('div');
                    div.id = `lv-${lv.id}`;
                    div.className = `bg-[#18181b] border border-[#3f3f46] rounded cursor-pointer hover:border-[#52525b] transition-all overflow-hidden relative group ${lv.id === selectedLV.id ? 'selected-card' : ''}`;
                    div.onclick = () => { selectedLV = lv; selectedTierInfo = tier; updateUI(); calculatePremium(); };
                    
                    div.innerHTML = `
                        <div class="rocket-placeholder text-xl opacity-90 transition-all duration-300 group-hover:scale-105" style="background-color: ${tier.hex};">
                            ${lv.flag} ${lv.name}
                        </div>
                        <div class="p-2 border-t border-[#3f3f46] flex justify-between items-center bg-[#121212]">
                            <span class="font-mono text-[10px] text-anthropicGray tracking-wider">HERITAGE</span>
                            <span class="font-mono text-[11px] font-bold ${tier.text}">${(lv.rel * 100).toFixed(1)}%</span>
                        </div>
                    `;
                    grid.appendChild(div);
                });
                lvContainer.appendChild(grid);
            });

            // Build OTVs
            orbitalTugs.forEach(otv => {
                const div = document.createElement('div');
                div.id = `otv-${otv.id}`;
                div.className = `bg-[#18181b] border border-[#3f3f46] rounded p-3 cursor-pointer hover:border-[#52525b] transition-all flex flex-col justify-between h-[70px] ${otv.id === selectedOTV.id ? 'selected-card' : ''}`;
                div.onclick = () => { selectedOTV = otv; updateUI(); calculatePremium(); };
                
                div.innerHTML = `
                    <p class="font-semibold text-xs text-white truncate">${otv.name}</p>
                    <p class="font-mono text-[10px] text-anthropicGray">${otv.id === 'none' ? 'BASE (Direct)' : 'Rel: ' + (otv.rel * 100).toFixed(1) + '%'}</p>
                `;
                otvContainer.appendChild(div);
            });
        }

        function updateUI() {
            launchTiers.forEach(tier => {
                tier.vehicles.forEach(lv => {
                    const el = document.getElementById(`lv-${lv.id}`);
                    if(el) el.className = `bg-[#18181b] border border-[#3f3f46] rounded cursor-pointer hover:border-[#52525b] transition-all overflow-hidden relative group ${lv.id === selectedLV.id ? 'selected-card' : ''}`;
                });
            });

            const badge = document.getElementById('risk-badge');
            badge.className = `text-[10px] uppercase tracking-wider font-mono px-2 py-1 rounded border ${selectedTierInfo.border} ${selectedTierInfo.bg} ${selectedTierInfo.text}`;
            badge.innerText = selectedTierInfo.name.split(':')[0]; 

            orbitalTugs.forEach(otv => {
                const el = document.getElementById(`otv-${otv.id}`);
                if(el) el.className = `bg-[#18181b] border border-[#3f3f46] rounded p-3 cursor-pointer hover:border-[#52525b] transition-all flex flex-col justify-between h-[70px] ${otv.id === selectedOTV.id ? 'selected-card' : ''}`;
            });
        }

        function calculatePremium() {
            const tiv = parseFloat(document.getElementById('insuredValue').value) || 0;
            const orbitMod = parseFloat(document.querySelector('input[name="orbit"]:checked').value);
            const heritageMod = parseFloat(document.querySelector('input[name="heritage"]:checked').value);
            
            const includeInOrbit = document.getElementById('chk-inorbit').checked;
            const isConstellation = document.getElementById('chk-constellation').checked;
            const isReused = document.getElementById('chk-reused').checked;

            const systemPoS = selectedLV.rel * selectedOTV.rel;
            const baseBurnRate = (1 - systemPoS) * 100; 

            let technicalRate = baseBurnRate * orbitMod * heritageMod;
            if (isReused) technicalRate *= 1.02; 
            if (technicalRate < 0.75) technicalRate = 0.75; 

            let commercialRate = technicalRate * 1.15; 
            if (includeInOrbit) commercialRate += 1.5; 
            if (isConstellation) commercialRate *= 0.85; 

            const totalPremium = tiv * (commercialRate / 100);

            document.getElementById('out-pos').innerText = (systemPoS * 100).toFixed(2) + '%';
            document.getElementById('out-tech-rate').innerText = technicalRate.toFixed(2) + '%';
            document.getElementById('out-final-rate').innerText = commercialRate.toFixed(2) + '%';
            
            if(totalPremium >= 1) {
                document.getElementById('out-premium').innerText = `$${totalPremium.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} M`;
            } else {
                document.getElementById('out-premium').innerText = `$${(totalPremium * 1000000).toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0})}`;
            }
        }

        document.querySelectorAll('input').forEach(el => {
            el.addEventListener('change', calculatePremium);
            el.addEventListener('input', calculatePremium);
        });

        initDOM();
        updateUI();
        calculatePremium();

    </script>
</body>
</html>
